<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>margolo</title>

<style>
body {
  margin: 0;
  background: #f1f1f1;
  color: white;
  font-family: Arial;
}

/* HEADER */
header {
  padding: 20px;
  font-size: 28px;
  color: #00b1b1;
  font-weight: bold;
}

/* SEARCH */
.search {
  padding: 0 20px 10px;
}

input {
  padding: 10px;
  width: 250px;
  border-radius: 6px;
  border: none;
}

/* FILTERS */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px 20px;
}

button {
  padding: 8px 12px;
  background: #000000;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #9e5959;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #387e5b;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.title {
  padding: 8px;
  font-weight: bold;
}

/* 📱 MOBILE */
@media (max-width: 768px) {
  header {
    font-size: 22px;
    text-align: center;
  }

  .search {
    display: flex;
    justify-content: center;
  }

  input {
    width: 90%;
  }

  .filters {
    justify-content: center;
  }

  button {
    flex: 1;
    min-width: 120px;
  }

  .grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    padding: 10px;
  }

  .card img {
    height: 200px;
  }

  .title {
    font-size: 13px;
  }
}
</style>
</head>

<body>

<header>🎬 margolo</header>

<div class="search">
  <input id="search" placeholder="Поиск..." oninput="render()" />
</div>

<div class="filters">
  <button onclick="setGenre('all')">Все</button>
  <button onclick="setGenre(28)">Боевик</button>
  <button onclick="setGenre(35)">Комедия</button>
  <button onclick="setGenre(53)">Триллер</button>
  <button onclick="setGenre(27)">Ужасы</button>
</div>

<div class="grid" id="movies">Загрузка...</div>

<script>

const API_KEY = "95bb09a244230d206b889e6a6bb48ded";
const IMG = "https://image.tmdb.org/t/p/w500";

let genre = "all";
let movies = [];
let page = 1;
let loading = false;

/* ========================= */
async function loadMovies() {
  if (loading) return;
  loading = true;

  try {
    let url = "";

    if (genre === "all") {
      url = `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&page=${page}&language=ru-RU`;
    }

    if (typeof genre === "number") {
      url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genre}&page=${page}&language=ru-RU`;
    }

    const res = await fetch(url);
    const data = await res.json();

    if (data.results) {
      movies = [...movies, ...data.results];
    }

    page++;

  } catch (e) {
    console.log("Ошибка:", e);
  }

  render();
  loading = false;
}

/* ========================= */
function render() {
  const grid = document.getElementById("movies");

  const search = document.getElementById("search").value.toLowerCase();

  let list = movies.filter(m =>
    (m.title || "").toLowerCase().includes(search)
  );

  if (!list.length) {
    grid.innerHTML = "Ничего не найдено 😢";
    return;
  }

  grid.innerHTML = list.map(m => `
    <div class="card" onclick="openMovie(${m.id})">
      <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
      <div class="title">${m.title}</div>
    </div>
  `).join("");
}

/* ========================= */
function setGenre(g) {
  genre = g;
  page = 1;
  movies = [];
  loadMovies();
}

/* ========================= */
function openMovie(id) {
  window.location.href = "/margolo/movie.html?id=" + id;
}

/* 📜 БЕСКОНЕЧНЫЙ СКРОЛЛ */
window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
    loadMovies();
  }
});

/* START */
loadMovies();

</script>

</body>
</html>
