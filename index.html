<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>margolo</title>

<style>
body {
  margin: 0;
  background: #ffffff;
  color: white;
  font-family: Arial;
}

header {
  padding: 20px;
  font-size: 28px;
  color: #00b1b1;
  font-weight: bold;
}

.search {
  padding: 0 20px 10px;
}

input {
  padding: 10px;
  width: 250px;
  border-radius: 6px;
  border: none;
}

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px 20px;
}

button {
  padding: 8px 12px;
  background: #770101;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #9e5959;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #31644a;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.title {
  padding: 8px;
  font-weight: bold;
}

/* mobile */
@media (max-width: 768px) {
  input { width: 90%; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}
</style>
</head>

<body>

<header>🎬 margolo</header>

<div class="search">
  <input id="search" placeholder="Поиск..." oninput="render()" />
</div>

<div class="filters">
  <button onclick="setGenre('all')">Все</button>
  <button onclick="setGenre(28)">Боевик</button>
  <button onclick="setGenre(35)">Комедия</button>
  <button onclick="setGenre(53)">Триллер</button>
  <button onclick="setGenre(27)">Ужасы</button>
</div>

<div class="grid" id="movies">Загрузка...</div>

<script>

const API_KEY = "95bb09a244230d206b889e6a6bb48ded";
const IMG = "https://image.tmdb.org/t/p/w500";

let genre = "all";
let movies = [];
let page = 1;
let loading = false;

/* ========================= */
async function loadMovies() {
  if (loading) return;
  loading = true;

  try {
    let url;

    if (genre === "all") {
      url = `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=ru-RU&page=${page}`;
    } else {
      url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genre}&language=ru-RU&page=${page}`;
    }

    const res = await fetch(url);
    const data = await res.json();

    movies = [...movies, ...(data.results || [])];
    page++;

  } catch (e) {
    console.log("Ошибка:", e);
  }

  loading = false;
  render();
}

/* ========================= */
function render() {
  const grid = document.getElementById("movies");
  const search = document.getElementById("search").value.toLowerCase();

  let list = movies.filter(m =>
    (m.title || m.name || "").toLowerCase().includes(search)
  );

  if (!list.length) {
    grid.innerHTML = "Ничего не найдено 😢";
    return;
  }

  grid.innerHTML = list.map(m => `
    <div class="card" onclick="openMovie(${m.id})">
      <img src="${m.poster_path ? IMG + m.poster_path : 'https://via.placeholder.com/300x450'}">
      <div class="title">${m.title || m.name}</div>
    </div>
  `).join("");
}

/* ========================= */
function setGenre(g) {
  genre = g;
  page = 1;
  movies = [];
  loadMovies();
}

/* ========================= */
/* ✔ ВАЖНОЕ ИСПРАВЛЕНИЕ (GitHub Pages) */
function openMovie(id) {
  window.location.href = "./movie.html?id=" + id;
}

/* ========================= */
window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
    loadMovies();
  }
});

loadMovies();

</script>

</body>
</html>
